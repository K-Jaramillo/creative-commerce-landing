version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    environment:
      POSTGRES_USER: ${DB_USER:-creative_commerce}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-creative_commerce}
    volumes:
      - cc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-creative_commerce}"]
      interval: 5s
      timeout: 5s
      retries: 5

  landing:
    image: cc-landing:latest
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    ports:
      - "3100:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-creative_commerce}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-creative_commerce}
      OLLAMA_BASE_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://cc.segicaweb.com

  dashboard-marca:
    image: cc-dashboard-marca:latest
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    ports:
      - "3101:3001"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-creative_commerce}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-creative_commerce}
      OLLAMA_BASE_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://cc-app.segicaweb.com

  dashboard-interno:
    image: cc-dashboard-interno:latest
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    ports:
      - "3102:3002"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-creative_commerce}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-creative_commerce}
      OLLAMA_BASE_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://cc-admin.segicaweb.com

volumes:
  cc_postgres_data:
