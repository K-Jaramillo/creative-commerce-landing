version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    environment:
      POSTGRES_USER: ${DB_USER:-creative_commerce}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-creative_commerce}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-creative_commerce}"]
      interval: 5s
      timeout: 5s
      retries: 5

  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    environment:
      DATABASE_URL: postgresql://${DB_USER:-creative_commerce}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-creative_commerce}
      OLLAMA_BASE_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://cc.segicaweb.com

  dashboard-marca:
    build:
      context: .
      dockerfile: Dockerfile.dashboard-marca
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    environment:
      DATABASE_URL: postgresql://${DB_USER:-creative_commerce}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-creative_commerce}
      OLLAMA_BASE_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://cc-app.segicaweb.com

  dashboard-interno:
    build:
      context: .
      dockerfile: Dockerfile.dashboard-interno
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    environment:
      DATABASE_URL: postgresql://${DB_USER:-creative_commerce}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-creative_commerce}
      OLLAMA_BASE_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://cc-admin.segicaweb.com

  proxy:
    image: nginx:alpine
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-init.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx-ssl.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - landing
      - dashboard-marca
      - dashboard-interno

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  postgres_data:
  certbot_www:
  certbot_certs:
